apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: source-postgres
  namespace: banvic
spec:
  selector:
    matchLabels:
      app: source-postgres
  serviceName: source-postgres
  replicas: 1
  template:
    metadata:
      labels:
        app: source-postgres
    spec:
      initContainers:
      - name: init-scripts
        image: postgres:16
        command: ["cp", "-r", "/init-scripts/.", "/docker-entrypoint-initdb.d/"]
        volumeMounts:
        - name: init-scripts
          mountPath: /init-scripts
        - name: initdb
          mountPath: /docker-entrypoint-initdb.d
      # Copia os CSVs do hostPath (Kind extraMount de data/source/) para emptyDir /data,
      # onde o script de init do postgres executa os COPYs.
      - name: copy-source-data
        image: busybox
        command: ["cp", "-r", "/host-data/.", "/data/"]
        volumeMounts:
        - name: host-source-data
          mountPath: /host-data
        - name: source-data
          mountPath: /data
      containers:
      - name: postgres
        image: postgres:16
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: banvic-secrets
              key: SOURCE_POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: banvic-secrets
              key: SOURCE_POSTGRES_PASSWORD
        - name: POSTGRES_DB
          value: banvic
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        - name: initdb
          mountPath: /docker-entrypoint-initdb.d
        - name: source-data
          mountPath: /data
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "banvic", "-d", "banvic"]
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: init-scripts
        configMap:
          name: source-init-scripts
      - name: initdb
        emptyDir: {}
      - name: host-source-data
        hostPath:
          path: /mnt/source-data
          type: Directory
      - name: source-data
        emptyDir: {}
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: source-postgres
  namespace: banvic
spec:
  selector:
    app: source-postgres
  ports:
  - port: 5432
    targetPort: 5432
  publishNotReadyAddresses: true
