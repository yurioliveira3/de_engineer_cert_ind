# EXEMPLO - não versione o secrets.yaml real.
# Crie k8s/secrets.yaml copiando este arquivo e substituindo os valores base64.
# Para codificar: echo -n "valor" | base64
#
# Aplique com: kubectl apply -f k8s/secrets.yaml -n banvic

# -- Segredos gerais do pipeline -----------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: banvic-secrets
  namespace: banvic
type: Opaque
data:
  SOURCE_POSTGRES_USER: YmFudmljCg==                    # banvic
  SOURCE_POSTGRES_PASSWORD: Y2hhbmdlbWUK                # changeme
  DW_POSTGRES_USER: YW5hbHl0aWNzCg==                   # analytics
  DW_POSTGRES_PASSWORD: Y2hhbmdlbWUK                    # changeme
  AIRFLOW_DB_USER: YWlyZmxvdwox                         # airflow
  AIRFLOW_DB_PASSWORD: Y2hhbmdlbWUK                     # changeme
  AIRFLOW_FERNET_KEY: CHANGE_ME_base64_encoded_fernet_key
  webserver-secret-key: CHANGE_ME_base64_encoded_secret
  AIRFLOW_ADMIN_PASSWORD: Y2hhbmdlbWUK                  # changeme
  # Connection strings completas usadas pelo Airflow (AIRFLOW_CONN_* env vars).
  # Ajuste user/password/host para bater com os valores acima.
  # echo -n "postgresql://analytics:SENHA@dw-postgres:5432/analytics_dw" | base64
  AIRFLOW_CONN_DW_POSTGRES: cG9zdGdyZXNxbDovL2FuYWx5dGljczpjaGFuZ2VtZUBkdy1wb3N0Z3Jlczo1NDMyL2FuYWx5dGljc19kdw==
  # echo -n "postgresql://banvic:SENHA@source-postgres:5432/banvic" | base64
