# -- Secret de metadados do Airflow (Helm chart: data.metadataSecretName) ----
# O Helm chart do Airflow lê a chave `connection` como SQLAlchemy URL do banco de metadados.
# echo -n "postgresql+psycopg2://airflow:SENHA@airflow-db:5432/airflow" | base64
apiVersion: v1
kind: Secret
metadata:
  name: airflow-metadata-secret
  namespace: banvic
type: Opaque
data:
  connection: cG9zdGdyZXNxbCtwc3ljb3BnMjovL2FpcmZsb3c6Y2hhbmdlbWVAYWlyZmxvdy1kYjo1NDMyL2FpcmZsb3c=
